name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require tag commit on main
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - run: uv run python -m pytest
      - run: uv build
      - name: Validate tag, metadata, and changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          built="$(uv run python -c 'import importlib.metadata; print(importlib.metadata.version("codex-axi"))')"
          test "$version" = "$built"
          grep -F "## [$version]" CHANGELOG.md
          uv run twine check dist/*
      - name: Smoke-test exact wheel and sdist
        run: |
          wheel="$(find dist -name '*.whl')"
          sdist="$(find dist -name '*.tar.gz')"
          uv tool run --from "$wheel" codex-axi --help
          uv tool run --from "$sdist" codex-axi doctor --help
      - run: sha256sum dist/* > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/
            SHA256SUMS
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            SHA256SUMS
          generate_release_notes: true
